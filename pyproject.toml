[tool.black]
line-length = 100
target-version = ['py312']
include = '\.pyi?$'
extend-exclude = '''
/(
    # 가상 환경 및 캐시 제외
    \.eggs
  | \.git
  | \.venv
  | _build
  | build
  | dist
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
pythonpath = ["."]
addopts = ["--import-mode=importlib"]

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [".venv", "migrations/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "B"]
ignore = ["B008"]
